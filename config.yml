    title: Amaury Pelzer
    subtitle: "Hello! This is Amaury! I'm a 1st year Ph.D. Candidate in Psychiatric Genetics at Maastricht University. 
      I am a part of the Neurogenomics & Translational Bioinformatics Laboratory (NG-TBL) at
      Boston University / Harvard Medical School / Broad Institute.

      <br><br>
      My research projects investigates the biological underpinnings of stress-related disorders such as MDD and PTSD.
      I employ a multi-disciplinary approach—integrating machine learning and statistical genetics—to analyze
      electronic health records (EHR) and bulk post-mortem tissue datasets.

      <br> <br>

      Thank you for visiting my webpage!
     "
